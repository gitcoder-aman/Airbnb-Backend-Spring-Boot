version: 0.2

phases:
  build:
    commands:
      - echo Building, Testing and packaging the application...
      - chmod +x mvnw
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - echo Build, Testing and packaging completed.

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'